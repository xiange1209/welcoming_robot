<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧銀行 LLM API 狀態</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 32px 16px; }
  .container { max-width: 860px; margin: 0 auto; }

  /* Nav */
  .nav { display: flex; gap: 8px; margin-bottom: 28px; }
  .nav a { padding: 7px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
           text-decoration: none; transition: background .15s; }
  .nav a.active { background: #1d4ed8; color: #fff; }
  .nav a.inactive { background: #1e2130; color: #64748b; border: 1px solid #2d3348; }
  .nav a.inactive:hover { background: #252b3b; color: #94a3b8; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; }
  .header h1 span { color: #60a5fa; }
  .last-update { font-size: 0.8rem; color: #64748b; margin-top: 4px; }
  .status-badge { display: inline-flex; align-items: center; gap: 8px;
                  padding: 8px 16px; border-radius: 999px; font-weight: 600; font-size: 0.95rem; }
  .status-online  { background: #052e16; color: #4ade80; border: 1px solid #16a34a; }
  .status-offline { background: #3b0a0a; color: #f87171; border: 1px solid #dc2626; }
  .status-loading { background: #1c1109; color: #fbbf24; border: 1px solid #d97706; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .dot.pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.3 } }

  /* Info row */
  .info-row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 28px;
              color: #94a3b8; font-size: 0.875rem; }
  .info-row span { display: flex; align-items: center; gap: 6px; }
  .info-row strong { color: #cbd5e1; }

  /* Stats grid */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  @media(max-width:600px){ .stats{ grid-template-columns: repeat(2,1fr); } }
  .stat-card { background: #1e2130; border: 1px solid #2d3348; border-radius: 12px;
               padding: 20px; text-align: center; }
  .stat-card .num { font-size: 2rem; font-weight: 700; color: #f1f5f9; }
  .stat-card .label { font-size: 0.75rem; color: #64748b; margin-top: 4px;
                      text-transform: uppercase; letter-spacing: .05em; }

  /* Uptime */
  .uptime-bar { background: #1e2130; border: 1px solid #2d3348; border-radius: 12px;
                padding: 16px 20px; margin-bottom: 28px; display: flex;
                align-items: center; gap: 12px; color: #94a3b8; font-size: 0.875rem; }
  .uptime-bar strong { color: #e2e8f0; font-size: 1rem; }

  /* Section title */
  .section-title { font-size: 0.9rem; font-weight: 600; color: #94a3b8;
                   text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }

  /* Log table */
  .log-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .log-table th { color: #475569; font-weight: 500; text-align: left;
                  padding: 8px 12px; border-bottom: 1px solid #2d3348; }
  .log-table td { padding: 10px 12px; border-bottom: 1px solid #1e2130; color: #94a3b8; }
  .log-table tr:hover td { background: #1e2130; cursor: pointer; }
  .intent-badge { display: inline-block; padding: 2px 8px; border-radius: 4px;
                  font-size: 0.75rem; font-weight: 600; }
  .intent-NAVIGATION { background:#0d2626; color:#67e8f9; }
  .intent-COMMAND    { background:#3b0a0a; color:#fca5a5; }
  .intent-CHAT       { background:#0c1f3d; color:#93c5fd; }
  .intent-unknown    { background:#1e2130; color:#64748b; }
  .ok-yes { color:#4ade80; } .ok-no { color:#f87171; }

  /* Thinking panel */
  .thinking-section { margin-top: 28px; }
  .thinking-meta { display: flex; gap: 20px; margin-bottom: 10px; font-size: 0.8rem; color: #64748b; }
  .thinking-meta span strong { color: #fbbf24; }
  .thinking-box { background: #0f1923; border: 1px solid #1e3a5f; border-radius: 10px;
                  padding: 16px 20px; font-family: 'Consolas', monospace;
                  font-size: 0.8rem; line-height: 1.7; color: #93c5fd;
                  white-space: pre-wrap; max-height: 320px; overflow-y: auto; }
  .thinking-empty { color: #475569; font-size: 0.875rem; padding: 20px;
                    text-align: center; background: #1e2130; border-radius: 10px; }

  #offline-banner { display:none; background:#3b0a0a; border:1px solid #dc2626;
                    color:#fca5a5; border-radius:8px; padding:12px 20px;
                    margin-bottom:20px; font-size:0.875rem; }
</style>
</head>
<body>
<div class="container">

  <div class="nav">
    <a href="/" class="active">📊 狀態監控</a>
    <a href="/chat" class="inactive">💬 互動對話</a>
  </div>

  <div class="header">
    <div>
      <h1>🏦 智慧銀行 <span>LLM API</span> 狀態監控</h1>
      <div class="last-update" id="last-update">— 載入中…</div>
    </div>
    <div id="status-badge" class="status-badge status-loading">
      <div class="dot pulse"></div>
      <span id="status-text">LOADING</span>
    </div>
  </div>

  <div id="offline-banner">⚠️ 無法連線到 API Server — 請確認 <code>python src/llm_server/main.py</code> 已啟動</div>

  <div class="info-row">
    <span>模型 <strong id="model-name">—</strong></span>
    <span>伺服器 <strong id="server-addr">—</strong></span>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="num" id="s-total">—</div><div class="label">總請求</div>
    </div>
    <div class="stat-card">
      <div class="num" id="s-success" style="color:#4ade80">—</div><div class="label">成功</div>
    </div>
    <div class="stat-card">
      <div class="num" id="s-failed" style="color:#f87171">—</div><div class="label">失敗</div>
    </div>
    <div class="stat-card">
      <div class="num" id="s-latency">—</div><div class="label">平均延遲</div>
    </div>
  </div>

  <div class="uptime-bar">⏱ 運行時間：<strong id="uptime-text">—</strong></div>

  <div>
    <div class="section-title">最近請求紀錄</div>
    <table class="log-table">
      <thead>
        <tr>
          <th>時間</th><th>人臉</th><th>姓名</th><th>意圖</th>
          <th>思考時間</th><th>總延遲</th><th>結果</th>
        </tr>
      </thead>
      <tbody id="log-body">
        <tr><td colspan="7" style="color:#475569;text-align:center;padding:20px">尚無請求紀錄</td></tr>
      </tbody>
    </table>
  </div>

  <div class="thinking-section">
    <div class="section-title">🧠 思考過程（點擊紀錄列可切換）</div>
    <div class="thinking-meta" id="thinking-meta" style="display:none">
      思考時間 <span><strong id="t-thinking-ms">—</strong> ms</span>
      &nbsp;|&nbsp; 總延遲 <span><strong id="t-total-ms">—</strong> ms</span>
      &nbsp;|&nbsp; 思考字數 <span><strong id="t-chars">—</strong> 字</span>
    </div>
    <div id="thinking-display" class="thinking-empty">尚無思考紀錄</div>
  </div>

</div>
<script>
let recentRequests = [], selectedIdx = 0;
function formatUptime(sec) {
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=Math.floor(sec%60);
  return h>0?`${h} 小時 ${m} 分鐘`:m>0?`${m} 分鐘 ${s} 秒`:`${s} 秒`;
}
function intentBadge(intent) {
  return intent ? `<span class="intent-badge intent-${intent}">${intent}</span>`
                : '<span class="intent-badge intent-unknown">unknown</span>';
}
function setStatus(st) {
  const b=document.getElementById('status-badge'), t=document.getElementById('status-text');
  b.className='status-badge status-'+st; t.textContent=st.toUpperCase();
  b.querySelector('.dot').className='dot'+(st==='loading'?' pulse':'');
}
function showThinking(idx) {
  selectedIdx=idx; const r=recentRequests[idx];
  const disp=document.getElementById('thinking-display'), meta=document.getElementById('thinking-meta');
  if(r&&r.thinking){
    meta.style.display='flex';
    document.getElementById('t-thinking-ms').textContent=r.thinking_ms??'—';
    document.getElementById('t-total-ms').textContent=r.latency_ms??'—';
    document.getElementById('t-chars').textContent=r.thinking.length;
    disp.className='thinking-box'; disp.textContent=r.thinking;
  } else {
    meta.style.display='none'; disp.className='thinking-empty'; disp.textContent='此請求無思考紀錄';
  }
  document.querySelectorAll('#log-body tr').forEach((tr,i)=>{tr.style.background=i===idx?'#1e3a5f22':'';});
}
async function poll() {
  try {
    const d=await fetch('/api/status',{cache:'no-store'}).then(r=>r.json());
    document.getElementById('offline-banner').style.display='none';
    setStatus('online');
    document.getElementById('model-name').textContent=d.model||'—';
    document.getElementById('server-addr').textContent=`${d.server_ip}:${d.server_port}`;
    document.getElementById('s-total').textContent=d.requests.total;
    document.getElementById('s-success').textContent=d.requests.success;
    document.getElementById('s-failed').textContent=d.requests.failed;
    document.getElementById('s-latency').textContent=d.requests.avg_latency_ms>0?d.requests.avg_latency_ms+' ms':'—';
    document.getElementById('uptime-text').textContent=formatUptime(d.uptime_seconds);
    document.getElementById('last-update').textContent='最後更新：'+new Date().toLocaleTimeString('zh-TW');
    recentRequests=d.recent_requests||[];
    const tbody=document.getElementById('log-body');
    if(recentRequests.length>0){
      tbody.innerHTML=recentRequests.map((r,i)=>`
        <tr onclick="showThinking(${i})">
          <td>${(r.time||'').slice(11)}</td><td>${r.face||'—'}</td>
          <td>${r.name||'<span style="color:#475569">—</span>'}</td>
          <td>${intentBadge(r.intent)}</td>
          <td style="color:#fbbf24">${r.thinking_ms!=null?r.thinking_ms+' ms':'—'}</td>
          <td>${r.latency_ms!=null?r.latency_ms+' ms':'—'}</td>
          <td class="${r.ok?'ok-yes':'ok-no'}">${r.ok?'✓':'✗'}</td>
        </tr>`).join('');
      showThinking(selectedIdx<recentRequests.length?selectedIdx:0);
    } else {
      tbody.innerHTML='<tr><td colspan="7" style="color:#475569;text-align:center;padding:20px">尚無請求紀錄</td></tr>';
    }
  } catch {
    setStatus('offline');
    document.getElementById('offline-banner').style.display='block';
    document.getElementById('last-update').textContent='連線失敗：'+new Date().toLocaleTimeString('zh-TW');
  }
}
poll(); setInterval(poll,5000);
</script>
</body>
</html>
