<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧銀行 AI 互動對話</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f1117; color: #e2e8f0;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* Nav bar */
.nav {
  background: #1e2130; border-bottom: 1px solid #2d3348;
  padding: 10px 20px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.nav-title { font-weight: 700; color: #f8fafc; font-size: 0.95rem; margin-right: 8px; }
.nav-title span { color: #60a5fa; }
.nav a { padding: 5px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
         text-decoration: none; transition: background .15s; }
.nav a.active  { background: #1d4ed8; color: #fff; }
.nav a.inactive { background: #161b27; color: #64748b; border: 1px solid #2d3348; }
.nav a.inactive:hover { background: #1e2535; color: #94a3b8; }
.nav-model { margin-left: auto; background: #1d3a6b; color: #93c5fd; padding: 2px 10px;
             border-radius: 999px; font-size: 0.75rem; }
.sdot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
.sdot.offline { background: #f87171; }

/* Chat area */
.chat-area {
  flex: 1; overflow-y: auto; padding: 24px 20px;
  display: flex; flex-direction: column; gap: 20px;
}
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-thumb { background: #2d3348; border-radius: 3px; }

/* Welcome */
.welcome { text-align: center; color: #475569; padding: 60px 20px; }
.welcome h2 { font-size: 1.3rem; color: #64748b; margin-bottom: 10px; }
.welcome p { font-size: 0.85rem; line-height: 1.8; }

/* Message rows */
.msg-row { display: flex; gap: 10px; max-width: 820px; width: 100%; }
.msg-row.user { flex-direction: row-reverse; margin-left: auto; }
.msg-row.assistant { margin-right: auto; }
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0; align-self: flex-end;
}
.avatar-user { background: #1d4ed8; }
.avatar-ai   { background: #064e3b; }
.msg-bubble { max-width: 680px; }

/* User bubble */
.user-ctx { font-size: 0.72rem; color: #4b7ab5; margin-bottom: 6px; text-align: right; }
.user-bubble {
  background: #1e2942; border: 1px solid #2d3f6b;
  border-radius: 16px 16px 4px 16px; padding: 12px 16px;
  color: #cbd5e1; font-size: 0.9rem; line-height: 1.6;
}

/* AI thinking */
.ai-thinking { background: #0f1923; border: 1px solid #1e3a5f; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
.thinking-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  cursor: pointer; user-select: none; font-size: 0.78rem; color: #4b7ab5;
}
.thinking-header:hover { background: #111e2e; }
.spinner {
  width: 13px; height: 13px; border: 2px solid #1e3a5f;
  border-top-color: #60a5fa; border-radius: 50%;
  animation: spin 0.8s linear infinite; flex-shrink: 0;
}
.spinner.done { animation: none; border-top-color: #4b7ab5; }
.thinking-time { margin-left: auto; color: #334e6b; }
.thinking-body {
  padding: 0 14px 12px; font-family: 'Consolas', monospace;
  font-size: 0.77rem; color: #93c5fd; line-height: 1.7;
  white-space: pre-wrap; max-height: 220px; overflow-y: auto;
}
.thinking-body::-webkit-scrollbar { width: 4px; }
.thinking-body::-webkit-scrollbar-thumb { background: #1e3a5f; }
.ai-thinking.collapsed .thinking-body { display: none; }

/* AI response */
.ai-response { background: #141e2e; border: 1px solid #1e3048; border-radius: 10px; padding: 14px 16px; display: none; }
.response-text { font-size: 0.95rem; color: #e2e8f0; line-height: 1.7; margin-bottom: 10px; }
.response-text.streaming::after { content: '▋'; animation: blink 0.7s infinite; color: #60a5fa; }
.ai-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 600; }
.intent-NAVIGATION { background:#0d2626; color:#67e8f9; }
.intent-COMMAND    { background:#3b0a0a; color:#fca5a5; }
.intent-CHAT       { background:#0c1f3d; color:#93c5fd; }
.intent-unknown    { background:#1e2130; color:#64748b; }
.badge-action  { background:#0f2918; color:#6ee7b7; }
.badge-timing  { background:none; color:#475569; font-weight:400; }
.json-btn {
  background:none; border:1px solid #2d3348; color:#64748b;
  border-radius:6px; padding:3px 10px; font-size:0.72rem; cursor:pointer; transition: all .15s;
}
.json-btn:hover { border-color:#4b7ab5; color:#93c5fd; }
.json-pre {
  background:#0d1117; border:1px solid #21262d; border-radius:8px;
  padding:12px; font-family:'Consolas',monospace; font-size:0.75rem;
  color:#7dd3fc; white-space:pre; overflow-x:auto; margin-top:8px; display:none;
}

/* Input area */
.input-area {
  background: #1a1f2e; border-top: 1px solid #2d3348;
  padding: 12px 20px 16px; flex-shrink: 0;
}
.ctx-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
.ctx-label { font-size: 0.75rem; color: #64748b; }
.ctx-sel, .ctx-inp {
  background: #0f1117; border: 1px solid #2d3348; border-radius: 8px;
  color: #e2e8f0; padding: 5px 10px; font-size: 0.82rem; outline: none;
}
.ctx-sel:focus, .ctx-inp:focus { border-color: #3b82f6; }
.ctx-inp { width: 120px; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.msg-ta {
  flex: 1; background: #0f1117; border: 1px solid #2d3348; border-radius: 12px;
  color: #e2e8f0; padding: 12px 16px; font-size: 0.9rem; resize: none;
  outline: none; font-family: inherit; line-height: 1.5;
  min-height: 48px; max-height: 120px;
}
.msg-ta:focus { border-color: #3b82f6; }
.msg-ta::placeholder { color: #475569; }
.btn-send {
  background: #1d4ed8; color: #fff; border: none; border-radius: 10px;
  padding: 0 22px; height: 48px; font-size: 0.88rem; font-weight: 600;
  cursor: pointer; transition: background .15s; white-space: nowrap;
}
.btn-send:hover { background: #2563eb; }
.btn-send:disabled { background: #1e2d4a; color: #3b5a9a; cursor: not-allowed; }

@keyframes spin  { to { transform: rotate(360deg); } }
@keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0 } }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-title">🏦 智慧銀行 <span>AI</span></span>
  <a href="/" class="inactive">📊 狀態監控</a>
  <a href="/chat" class="active">💬 互動對話</a>
  <span class="nav-model" id="nav-model">—</span>
  <div class="sdot" id="sdot"></div>
</nav>

<main class="chat-area" id="chat-area">
  <div class="welcome">
    <h2>智慧銀行 VIP 迎賓系統</h2>
    <p>設定辨識結果與 VIP 資訊<br>輸入客戶語音後送出，觀察 AI 即時思考與決策過程</p>
  </div>
</main>

<footer class="input-area">
  <div class="ctx-row">
    <span class="ctx-label">辨識</span>
    <select class="ctx-sel" id="ctx-face">
      <option value="vip">VIP</option>
      <option value="visitor">訪客</option>
      <option value="blacklist">黑名單</option>
    </select>
    <span class="ctx-label">姓名</span>
    <input class="ctx-inp" id="ctx-name" placeholder="陳佳憲" />
    <span class="ctx-label">等級</span>
    <select class="ctx-sel" id="ctx-vip">
      <option value="platinum">Platinum</option>
      <option value="gold">Gold</option>
      <option value="standard">Standard</option>
      <option value="">—</option>
    </select>
    <span class="ctx-label">性別</span>
    <select class="ctx-sel" id="ctx-gender">
      <option value="">—</option>
      <option value="M">男</option>
      <option value="F">女</option>
    </select>
  </div>
  <div class="input-row">
    <textarea class="msg-ta" id="msg-input"
      placeholder="輸入客戶語音或問題（留空則自動問候）…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="btn-send" id="btn-send" onclick="sendMessage()">送出 ↵</button>
  </div>
</footer>

<script>
let busy = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function scrollBottom() {
  const a = document.getElementById('chat-area');
  a.scrollTop = a.scrollHeight;
}

function appendUser(text, ctx) {
  const area = document.getElementById('chat-area');
  area.querySelector('.welcome')?.remove();
  const faceMap = { vip:'VIP', visitor:'訪客', blacklist:'黑名單' };
  const ctxInfo = [faceMap[ctx.face]||ctx.face, ctx.name, ctx.vip].filter(Boolean).join(' · ');
  const d = document.createElement('div');
  d.className = 'msg-row user';
  d.innerHTML = `
    <div class="avatar avatar-user">👤</div>
    <div class="msg-bubble">
      <div class="user-ctx">${ctxInfo}</div>
      <div class="user-bubble">${text || '（自動問候）'}</div>
    </div>`;
  area.appendChild(d);
  scrollBottom();
}

function appendAI() {
  const area = document.getElementById('chat-area');
  const id = 'ai' + Date.now();
  const d = document.createElement('div');
  d.className = 'msg-row assistant';
  d.innerHTML = `
    <div class="avatar avatar-ai">🤖</div>
    <div class="msg-bubble" style="width:100%">
      <div class="ai-thinking" id="${id}-tk">
        <div class="thinking-header" onclick="toggleTk('${id}-tk')">
          <span class="spinner" id="${id}-sp"></span>
          <span id="${id}-tklb">思考中…</span>
          <span class="thinking-time" id="${id}-tktime"></span>
        </div>
        <div class="thinking-body" id="${id}-tkbody"></div>
      </div>
      <div class="ai-response" id="${id}-resp">
        <div class="response-text streaming" id="${id}-rt"></div>
        <div class="ai-meta" id="${id}-meta"></div>
        <div id="${id}-jw"></div>
      </div>
    </div>`;
  area.appendChild(d);
  scrollBottom();
  return {
    tk:    () => document.getElementById(id+'-tk'),
    tkBody:() => document.getElementById(id+'-tkbody'),
    tkLb:  () => document.getElementById(id+'-tklb'),
    tkTime:() => document.getElementById(id+'-tktime'),
    sp:    () => document.getElementById(id+'-sp'),
    resp:  () => document.getElementById(id+'-resp'),
    rt:    () => document.getElementById(id+'-rt'),
    meta:  () => document.getElementById(id+'-meta'),
    jw:    () => document.getElementById(id+'-jw'),
  };
}

function toggleTk(id) { document.getElementById(id).classList.toggle('collapsed'); }
function toggleJ(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

async function sendMessage() {
  if (busy) return;
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  const ctx   = {
    face:   document.getElementById('ctx-face').value,
    name:   document.getElementById('ctx-name').value.trim() || null,
    vip:    document.getElementById('ctx-vip').value  || null,
    gender: document.getElementById('ctx-gender').value || null,
  };
  input.value = ''; input.style.height = 'auto';
  busy = true; document.getElementById('btn-send').disabled = true;

  appendUser(text, ctx);
  const h = appendAI();
  const t0 = Date.now();
  let thinkDone = false;

  try {
    const resp = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        face_recognition: ctx.face,
        person_name: ctx.name,
        vip_level:   ctx.vip,
        gender:      ctx.gender,
        customer_input: text,
      }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let evt; try { evt = JSON.parse(line.slice(6)); } catch { continue; }

        if (evt.type === 'thinking') {
          h.tkBody().textContent += evt.text;
          h.tkBody().scrollTop = h.tkBody().scrollHeight;
          h.tkTime().textContent = ((Date.now()-t0)/1000).toFixed(1) + 's';
          scrollBottom();

        } else if (evt.type === 'content') {
          if (!thinkDone) {
            thinkDone = true;
            h.sp().className = 'spinner done';
            h.tkLb().textContent = '思考完成';
            h.tkTime().textContent = (Date.now()-t0) + ' ms';
            h.tk().classList.add('collapsed');
            h.resp().style.display = 'block';
          }
          scrollBottom();

        } else if (evt.type === 'done') {
          const r = evt.result || {};
          h.rt().classList.remove('streaming');
          h.rt().textContent = r.reply || '（無回覆文字）';
          const actionInfo = [r.action, r.target].filter(Boolean).join(' → ');
          h.meta().innerHTML = `
            ${r.intent?`<span class="badge intent-${r.intent}">${r.intent}</span>`:''}
            ${actionInfo?`<span class="badge badge-action">⚙ ${actionInfo}</span>`:''}
            <span class="badge badge-timing">🧠 ${evt.thinking_ms} ms</span>
            <span class="badge badge-timing">⏱ 總計 ${evt.elapsed_ms} ms</span>`;
          if (r && Object.keys(r).length > 0) {
            const jid = 'j' + Date.now();
            h.jw().innerHTML = `
              <button class="json-btn" onclick="toggleJ('${jid}')">{ } 原始 JSON</button>
              <pre class="json-pre" id="${jid}">${JSON.stringify(r, null, 2)}</pre>`;
          }
          scrollBottom();

        } else if (evt.type === 'error') {
          h.tkLb().textContent = '❌ ' + evt.message;
          h.sp().style.display = 'none';
        }
      }
    }
  } catch (e) {
    h.tkLb().textContent = '❌ ' + e.message;
    h.sp().style.display = 'none';
  } finally {
    busy = false;
    document.getElementById('btn-send').disabled = false;
  }
}

// Status indicator
async function pollStatus() {
  try {
    const d = await fetch('/api/status', { cache: 'no-store' }).then(r => r.json());
    document.getElementById('nav-model').textContent = d.model || '—';
    document.getElementById('sdot').className = 'sdot';
  } catch {
    document.getElementById('sdot').className = 'sdot offline';
  }
}
pollStatus();
setInterval(pollStatus, 10000);
</script>
</body>
</html>
