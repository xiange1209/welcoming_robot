<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>智慧銀行迎賓機器人</title>
<style>
  :root {
    --bg: #0f1420; --panel: #1a2233; --line: #2a3550;
    --fg: #e8edf7; --dim: #8fa0bd;
    --vip: #d4af37; --alert: #e5484d; --ok: #46a758;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: .75rem;
    padding: .6rem 1.2rem; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 1.15rem; font-weight: 600; flex: 1; }
  #conn { display: flex; align-items: center; gap: .4rem; font-size: .85rem; color: var(--dim); }
  #dot { width: .65rem; height: .65rem; border-radius: 50%; background: var(--alert); }
  #dot.on { background: var(--ok); }
  #volt { font-size: .85rem; color: var(--dim); }

  main { flex: 1; display: flex; gap: .8rem; padding: .8rem; min-height: 0; }
  #cam-panel { flex: 3; display: flex; flex-direction: column; min-width: 0; }
  #cam {
    flex: 1; width: 100%; object-fit: contain; background: #000;
    border: 1px solid var(--line); border-radius: .6rem; min-height: 0;
  }
  #side { flex: 2; display: flex; flex-direction: column; gap: .8rem; min-width: 0; }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: .6rem; padding: .8rem 1rem; }
  .card h2 { font-size: .8rem; color: var(--dim); font-weight: 500; margin-bottom: .5rem; letter-spacing: .1em; }

  #greet { text-align: center; padding: 1.1rem 1rem; transition: background .3s; }
  #greet .name { font-size: 1.9rem; font-weight: 700; }
  #greet .sub { font-size: .95rem; color: var(--dim); margin-top: .3rem; }
  #greet.vip { background: linear-gradient(135deg, #2a2410, var(--panel)); border-color: var(--vip); }
  #greet.vip .name { color: var(--vip); }
  #greet.blacklist { background: linear-gradient(135deg, #2a1012, var(--panel)); border-color: var(--alert); }
  #greet.blacklist .name { color: var(--alert); }

  #chat { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: .55rem; min-height: 0; }
  .msg { max-width: 88%; padding: .55rem .8rem; border-radius: .7rem; font-size: .98rem; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #24406b; border-bottom-right-radius: .15rem; }
  .msg.robot { align-self: flex-start; background: #232c42; border-bottom-left-radius: .15rem; }
  .msg .who { font-size: .7rem; color: var(--dim); margin-bottom: .15rem; }
</style>
</head>
<body>
<header>
  <h1>🏦 智慧銀行迎賓機器人</h1>
  <span id="volt"></span>
  <span id="conn"><span id="dot"></span><span id="conn-text">連線中…</span></span>
</header>
<main>
  <div id="cam-panel">
    <img id="cam" alt="相機畫面載入中…">
  </div>
  <div id="side">
    <div class="card" id="greet">
      <div class="name">歡迎光臨</div>
      <div class="sub">請面向鏡頭</div>
    </div>
    <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <h2>對話</h2>
      <div id="chat"></div>
    </div>
  </div>
</main>
<script>
(function () {
  "use strict";
  var host = location.hostname || "localhost";
  var ROSBRIDGE_URL = "ws://" + host + ":9090";
  var VIDEO_URL = "http://" + host + ":8080/stream?topic=/image_raw";

  document.getElementById("cam").src = VIDEO_URL;

  var dot = document.getElementById("dot");
  var connText = document.getElementById("conn-text");
  var chat = document.getElementById("chat");
  var greet = document.getElementById("greet");
  var ws = null;

  function subscribe(topic, type) {
    ws.send(JSON.stringify({ op: "subscribe", id: topic, topic: topic, type: type }));
  }

  function addMsg(cls, who, text) {
    if (!text) return;
    var div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerHTML = '<div class="who">' + who + "</div>";
    div.appendChild(document.createTextNode(text));
    chat.appendChild(div);
    while (chat.children.length > 40) chat.removeChild(chat.firstChild);
    chat.scrollTop = chat.scrollHeight;
  }

  function onRecognition(m) {
    var name = m.person_name || "Unknown";
    var type = m.person_type || "";
    var nameEl = greet.querySelector(".name");
    var subEl = greet.querySelector(".sub");
    greet.classList.remove("vip", "blacklist");
    if (type === "VIP") {
      greet.classList.add("vip");
      nameEl.textContent = "尊榮貴賓 " + name + "，歡迎蒞臨";
      subEl.textContent = "已通知專屬服務人員（信心度 " + Math.round((m.confidence || 0) * 100) + "%）";
    } else if (type === "BLACKLIST") {
      greet.classList.add("blacklist");
      nameEl.textContent = "⚠ 安全通報";
      subEl.textContent = "偵測到注意名單人員，已通報行員";
    } else if (name !== "Unknown") {
      nameEl.textContent = name + "，您好";
      subEl.textContent = "很高興為您服務";
    } else {
      nameEl.textContent = "歡迎光臨";
      subEl.textContent = "請面向鏡頭";
    }
  }

  function onMessage(ev) {
    var d;
    try { d = JSON.parse(ev.data); } catch (e) { return; }
    if (d.op !== "publish") return;
    switch (d.topic) {
      case "/face_recognition/result": onRecognition(d.msg); break;
      case "/user_text": addMsg("user", "訪客", d.msg.data); break;
      case "/llm_response": addMsg("robot", "機器人", d.msg.data); break;
      case "/PowerVoltage":
        document.getElementById("volt").textContent = "🔋 " + d.msg.data.toFixed(1) + " V";
        break;
    }
  }

  function connect() {
    ws = new WebSocket(ROSBRIDGE_URL);
    ws.onopen = function () {
      dot.classList.add("on");
      connText.textContent = "已連線";
      subscribe("/face_recognition/result", "smartnav_msgs/msg/RecognitionResult");
      subscribe("/user_text", "std_msgs/msg/String");
      subscribe("/llm_response", "std_msgs/msg/String");
      subscribe("/PowerVoltage", "std_msgs/msg/Float32");
    };
    ws.onmessage = onMessage;
    ws.onclose = function () {
      dot.classList.remove("on");
      connText.textContent = "重新連線中…";
      setTimeout(connect, 2000);
    };
    ws.onerror = function () { ws.close(); };
  }
  connect();
})();
</script>
</body>
</html>
